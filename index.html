<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yachay Web - Landing Page</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <script src="js/form-scripts.js" defer></script>
</head>

<body>

    <!-- Main Navigation Bar -->
    <header class="navbar-header">
        <div class="navbar-logo-container">
            <img src="assets/icons/logo.png" alt="Yachay Web Logo" class="logo-img">
            <span class="logo-text">Yachay Web</span>
        </div>

        <!-- Menu Links -->
        <nav class="navbar-menu">
            <ul>
                <li><a href="#features">Características</a></li>
                <li><a href="#levels">Niveles</a></li>
                <li><a href="#experiences">Experiencias</a></li>
                <li><a href="#contact">Contacto</a></li>
            </ul>
        </nav>

        <!-- Actions Buttons -->
        <div class="navbar-actions">
            <a href="#login" class="btn-login">Iniciar Sesión</a>
            <a href="#register" class="btn-register">Registrarse</a>
        </div>
    </header>

    <!-- Main Content Sections -->
    <main>
        <!-- Portada -->
        <section id="hero" class="landing-section">
            <h1>Bienvenido a Yachay Web</h1>
        </section>

        <!-- Secciones -->
        <section id="features" class="landing-section">
            <h2>Características</h2>
        </section>

        <section id="levels" class="landing-section">
            <h2>Niveles</h2>
        </section>

        <section id="experiences" class="landing-section">
            <h2>Experiencias</h2>
        </section>

        <section id="contact" class="landing-section">
            <h2>Contáctanos</h2>
                <form class="formulario" id="contactForm">
                    <div class="campo-formulario">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">
                    </div>

                    <div class="campo-formulario">
                        <label for="correo">Email</label>
                        <input type="email" id="correo" name="correo" placeholder="tu@email.com">
                    </div>

                    <div class="campo-formulario">
                        <label for="mensaje">Mensaje</label>
                        <textarea id="mensaje" name="mensaje" placeholder="Tu mensaje..."></textarea>
                    </div>

                    <button type="submit" class="btn-enviar">Enviar</button>
                </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Yachay Web. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
